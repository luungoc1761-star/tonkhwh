<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Tồn Kho - Warehouse App</title>
    <!-- Tailwind CSS cho giao diện -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- SheetJS để xuất Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .modal { transition: opacity 0.25s ease; }
        body { background-color: #f3f4f6; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                <span class="text-3xl">📦</span> Hệ Thống Quản Lý Tồn Kho
            </h1>
            <div class="flex flex-wrap gap-2">
                <button onclick="openModal('importModal')" class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700 transition flex items-center gap-1">
                    <span>➕</span> Nhập Kho
                </button>
                <button onclick="openModal('exportModal')" class="bg-red-600 text-white px-4 py-2 rounded shadow hover:bg-red-700 transition flex items-center gap-1">
                    <span>📤</span> Xuất Kho
                </button>
                <button onclick="exportToExcel()" class="bg-green-600 text-white px-4 py-2 rounded shadow hover:bg-green-700 transition flex items-center gap-1">
                    <span>📊</span> Xuất Excel
                </button>
            </div>
        </div>

        <!-- Filter Section -->
        <div class="bg-white p-4 rounded-lg shadow-sm mb-6 grid grid-cols-1 md:grid-cols-5 gap-4 border border-gray-200">
            <div class="flex flex-col gap-1">
                <label class="text-xs font-semibold text-gray-500 uppercase">Lọc Bin</label>
                <input type="text" id="filterBin" placeholder="Nhập Bin..." class="border p-2 rounded w-full focus:ring-2 focus:ring-blue-400 outline-none" oninput="filterTable()">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-xs font-semibold text-gray-500 uppercase">Lọc TagID</label>
                <input type="text" id="filterTag" placeholder="Nhập TagID..." class="border p-2 rounded w-full focus:ring-2 focus:ring-blue-400 outline-none" oninput="filterTable()">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-xs font-semibold text-gray-500 uppercase">Lọc Code</label>
                <input type="text" id="filterCode" placeholder="Nhập Code..." class="border p-2 rounded w-full focus:ring-2 focus:ring-blue-400 outline-none" oninput="filterTable()">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-xs font-semibold text-gray-500 uppercase">Lọc WH (Kho)</label>
                <input type="text" id="filterWh" placeholder="Nhập WH..." class="border p-2 rounded w-full focus:ring-2 focus:ring-blue-400 outline-none" oninput="filterTable()">
            </div>
            <div class="flex items-end">
                <button onclick="resetFilter()" class="w-full bg-gray-200 text-gray-700 px-4 py-2 rounded hover:bg-gray-300 transition font-medium">
                    🔄 Xóa bộ lọc
                </button>
            </div>
        </div>

        <!-- Inventory Table -->
        <div class="bg-white rounded-lg shadow overflow-hidden border border-gray-200">
            <div class="overflow-x-auto">
                <table class="min-w-full leading-normal">
                    <thead>
                        <tr class="bg-gray-100 text-gray-600 uppercase text-xs font-bold leading-normal">
                            <th class="py-3 px-6 text-left">Thời gian</th>
                            <th class="py-3 px-6 text-left">TagID</th>
                            <th class="py-3 px-6 text-left">Bin</th>
                            <th class="py-3 px-6 text-left">Code</th>
                            <th class="py-3 px-6 text-left">WH</th>
                            <th class="py-3 px-6 text-left">Quality</th>
                            <th class="py-3 px-6 text-center">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryBody" class="text-gray-600 text-sm font-light">
                        <!-- Dữ liệu sẽ load ở đây -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal: Nhập Kho (Manual & CSV) -->
    <div id="importModal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50">
        <div class="modal-overlay absolute w-full h-full bg-gray-900 opacity-50"></div>
        <div class="modal-container bg-white w-11/12 md:max-w-md mx-auto rounded-xl shadow-2xl z-50 overflow-y-auto border border-gray-200">
            <div class="py-4 text-left px-6">
                <div class="flex justify-between items-center pb-4 border-b">
                    <p class="text-xl font-bold text-gray-800">📥 Nhập Kho</p>
                    <div class="cursor-pointer text-gray-400 hover:text-gray-600 text-2xl" onclick="closeModal('importModal')">×</div>
                </div>
                
                <div class="flex mb-6 mt-4 border-b">
                    <button onclick="switchImportTab('manual')" id="tabManual" class="py-2 px-4 border-b-2 border-blue-500 font-bold text-blue-600 transition">Nhập thủ công</button>
                    <button onclick="switchImportTab('csv')" id="tabCsv" class="py-2 px-4 border-b-2 border-transparent text-gray-500 hover:text-blue-500 transition">Nhập File CSV</button>
                </div>

                <!-- Manual Form -->
                <div id="manualForm" class="space-y-4">
                    <div>
                        <label class="text-xs font-semibold text-gray-500 uppercase">Tag ID</label>
                        <input type="text" id="inTag" placeholder="Ví dụ: TAG123" class="w-full border p-2 rounded mt-1 outline-none focus:ring-2 focus:ring-blue-400">
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-gray-500 uppercase">Bin</label>
                        <input type="text" id="inBin" placeholder="Ví dụ: A-01" class="w-full border p-2 rounded mt-1 outline-none focus:ring-2 focus:ring-blue-400">
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-gray-500 uppercase">Code</label>
                        <input type="text" id="inCode" placeholder="Ví dụ: PROD-001" class="w-full border p-2 rounded mt-1 outline-none focus:ring-2 focus:ring-blue-400">
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-gray-500 uppercase">WH (Kho)</label>
                        <input type="text" id="inWh" placeholder="Ví dụ: WH-01" class="w-full border p-2 rounded mt-1 outline-none focus:ring-2 focus:ring-blue-400">
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-gray-500 uppercase">Quality</label>
                        <input type="text" id="inQuality" placeholder="Ví dụ: Grade A" class="w-full border p-2 rounded mt-1 outline-none focus:ring-2 focus:ring-blue-400">
                    </div>
                    <button onclick="insertManual()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 shadow-lg transition">Lưu dữ liệu</button>
                </div>

                <!-- CSV Form -->
                <div id="csvForm" class="hidden space-y-4">
                    <div class="bg-yellow-50 p-3 rounded border border-yellow-200">
                        <p class="text-sm text-yellow-700"><strong>Định dạng CSV chuẩn:</strong><br>tagID, bin, code, wh, quality</p>
                    </div>
                    <input type="file" id="csvFile" accept=".csv" class="w-full border p-2 rounded bg-gray-50">
                    <button onclick="insertCSV()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 shadow-lg transition">Upload và Nhập Kho</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Xuất Kho -->
    <div id="exportModal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50">
        <div class="modal-overlay absolute w-full h-full bg-gray-900 opacity-50"></div>
        <div class="modal-container bg-white w-11/12 md:max-w-md mx-auto rounded-xl shadow-2xl z-50 overflow-y-auto border border-gray-200">
            <div class="py-4 text-left px-6">
                <div class="flex justify-between items-center pb-4 border-b">
                    <p class="text-xl font-bold text-gray-800">📤 Xuất Kho</p>
                    <div class="cursor-pointer text-gray-400 hover:text-gray-600 text-2xl" onclick="closeModal('exportModal')">×</div>
                </div>
                <div class="space-y-4 mt-6">
                    <p class="text-sm text-gray-600">Nhập TagID của sản phẩm cần xuất kho. Sản phẩm này sẽ được xóa khỏi danh sách tồn kho.</p>
                    <div>
                        <label class="text-xs font-semibold text-gray-500 uppercase">TagID Sản phẩm</label>
                        <input type="text" id="outTag" placeholder="Nhập chính xác TagID..." class="w-full border p-2 rounded mt-1 outline-none focus:ring-2 focus:ring-red-400">
                    </div>
                    <button onclick="removeInventory()" class="w-full bg-red-600 text-white py-3 rounded-lg font-bold hover:bg-red-700 shadow-lg transition">Xác nhận Xuất Kho</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Chỉnh sửa -->
    <div id="editModal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50">
        <div class="modal-overlay absolute w-full h-full bg-gray-900 opacity-50"></div>
        <div class="modal-container bg-white w-11/12 md:max-w-md mx-auto rounded-xl shadow-2xl z-50 overflow-y-auto border border-gray-200">
            <div class="py-4 text-left px-6">
                <div class="flex justify-between items-center pb-4 border-b">
                    <p class="text-xl font-bold text-gray-800">✏️ Chỉnh sửa thông tin</p>
                    <div class="cursor-pointer text-gray-400 hover:text-gray-600 text-2xl" onclick="closeModal('editModal')">×</div>
                </div>
                <input type="hidden" id="editId">
                <div class="space-y-4 mt-6">
                    <div>
                        <label class="text-xs font-semibold text-gray-500 uppercase">TagID</label>
                        <input type="text" id="editTag" class="w-full border p-2 rounded mt-1 outline-none focus:ring-2 focus:ring-blue-400">
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-gray-500 uppercase">Bin</label>
                        <input type="text" id="editBin" class="w-full border p-2 rounded mt-1 outline-none focus:ring-2 focus:ring-blue-400">
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-gray-500 uppercase">Code</label>
                        <input type="text" id="editCode" class="w-full border p-2 rounded mt-1 outline-none focus:ring-2 focus:ring-blue-400">
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-gray-500 uppercase">WH (Kho)</label>
                        <input type="text" id="editWh" class="w-full border p-2 rounded mt-1 outline-none focus:ring-2 focus:ring-blue-400">
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-gray-500 uppercase">Quality</label>
                        <input type="text" id="editQuality" class="w-full border p-2 rounded mt-1 outline-none focus:ring-2 focus:ring-blue-400">
                    </div>
                    <button onclick="updateInventory()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 shadow-lg transition">Cập nhật thay đổi</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ayxhdqaendspvdxibayh.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5eGhkcWFlbmRzcHZkeGliYXloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NDAzMDQsImV4cCI6MjA5NTUxNjMwNH0.MOmERW-oVJitj6fAB85439_nxqeyYMQhQ5rYr8TF-Fc';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allData = [];

        async function loadData() {
            const { data, error } = await supabaseClient
                .from('inventory')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Error loading:', error);
                alert('Lỗi tải dữ liệu: ' + error.message);
            } else {
                allData = data;
                renderTable(data);
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('inventoryBody');
            tbody.innerHTML = '';
            
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="py-10 text-center text-gray-400 italic">Không tìm thấy dữ liệu tồn kho nào...</td></tr>';
                return;
            }

            data.forEach(item => {
                tbody.innerHTML += `
                    <tr class="border-b border-gray-100 hover:bg-blue-50 transition">
                        <td class="py-3 px-6 text-left text-gray-500">${new Date(item.created_at).toLocaleString('vi-VN')}</td>
                        <td class="py-3 px-6 text-left font-semibold text-gray-800">${item.tag_id}</td>
                        <td class="py-3 px-6 text-left">${item.bin || '-'}</td>
                        <td class="py-3 px-6 text-left">${item.code || '-'}</td>
                        <td class="py-3 px-6 text-left font-medium text-blue-600">${item.wh || '-'}</td>
                        <td class="py-3 px-6 text-left">
                            <span class="px-2 py-1 bg-gray-100 rounded-full text-xs">${item.quality || '-'}</span>
                        </td>
                        <td class="py-3 px-6 text-center">
                            <button onclick="openEditModal(${item.id}, '${item.tag_id}', '${item.bin}', '${item.code}', '${item.wh}', '${item.quality}')" 
                                class="text-blue-600 hover:text-blue-800 font-medium transition underline">Sửa</button>
                        </td>
                    </tr>
                `;
            });
        }

        function filterTable() {
            const bin = document.getElementById('filterBin').value.toLowerCase();
            const tag = document.getElementById('filterTag').value.toLowerCase();
            const code = document.getElementById('filterCode').value.toLowerCase();
            const wh = document.getElementById('filterWh').value.toLowerCase();

            const filtered = allData.filter(item => 
                (item.bin || '').toLowerCase().includes(bin) &&
                (item.tag_id || '').toLowerCase().includes(tag) &&
                (item.code || '').toLowerCase().includes(code) &&
                (item.wh || '').toLowerCase().includes(wh)
            );
            renderTable(filtered);
        }

        function resetFilter() {
            document.getElementById('filterBin').value = '';
            document.getElementById('filterTag').value = '';
            document.getElementById('filterCode').value = '';
            document.getElementById('filterWh').value = '';
            renderTable(allData);
        }

        async function insertManual() {
            const payload = {
                tag_id: document.getElementById('inTag').value,
                bin: document.getElementById('inBin').value,
                code: document.getElementById('inCode').value,
                wh: document.getElementById('inWh').value,
                quality: document.getElementById('inQuality').value,
            };

            if(!payload.tag_id) return alert('Vui lòng nhập ít nhất TagID');

            const { error } = await supabaseClient.from('inventory').insert([payload]);
            if (error) alert('Lỗi: ' + error.message);
            else {
                alert('✅ Nhập kho thành công!');
                closeModal('importModal');
                document.getElementById('inTag').value = '';
                document.getElementById('inBin').value = '';
                document.getElementById('inCode').value = '';
                document.getElementById('inWh').value = '';
                document.getElementById('inQuality').value = '';
                loadData();
            }
        }

        async function insertCSV() {
            const fileInput = document.getElementById('csvFile');
            const file = fileInput.files[0];
            if (!file) return alert('Vui lòng chọn file CSV');

            const reader = new FileReader();
            reader.onload = async (e) => {
                const text = e.target.result;
                const rows = text.split('\n').slice(1); 
                const dataToInsert = rows.filter(row => row.trim()).map(row => {
                    const cols = row.split(',');
                    return { 
                        tag_id: cols[0]?.trim(), 
                        bin: cols[1]?.trim(), 
                        code: cols[2]?.trim(), 
                        wh: cols[3]?.trim(), 
                        quality: cols[4]?.trim() 
                    };
                });

                const { error } = await supabaseClient.from('inventory').insert(dataToInsert);
                if (error) alert('Lỗi upload: ' + error.message);
                else {
                    alert('✅ Nhập kho CSV thành công!');
                    closeModal('importModal');
                    loadData();
                }
            };
            reader.readAsText(file);
        }

        async function removeInventory() {
            const tagId = document.getElementById('outTag').value;
            if (!tagId) return alert('Vui lòng nhập TagID');
            if(!confirm(`Bạn có chắc chắn muốn xuất kho sản phẩm có TagID: ${tagId}?`)) return;

            const { error } = await supabaseClient.from('inventory').delete().eq('tag_id', tagId);
            if (error) alert('Lỗi: ' + error.message);
            else {
                alert('✅ Đã xuất kho sản phẩm thành công!');
                closeModal('exportModal');
                document.getElementById('outTag').value = '';
                loadData();
            }
        }

        function openEditModal(id, tag, bin, code, wh, quality) {
            document.getElementById('editId').value = id;
            document.getElementById('editTag').value = tag;
            document.getElementById('editBin').value = bin;
            document.getElementById('editCode').value = code;
            document.getElementById('editWh').value = wh;
            document.getElementById('editQuality').value = quality;
            openModal('editModal');
        }

        async function updateInventory() {
            const id = document.getElementById('editId').value;
            const payload = {
                tag_id: document.getElementById('editTag').value,
                bin: document.getElementById('editBin').value,
                code: document.getElementById('editCode').value,
                wh: document.getElementById('editWh').value,
                quality: document.getElementById('editQuality').value,
            };
            const { error } = await supabaseClient.from('inventory').update(payload).eq('id', id);
            if (error) alert('Lỗi cập nhật: ' + error.message);
            else {
                alert('✅ Cập nhật thành công!');
                closeModal('editModal');
                loadData();
            }
        }

        function exportToExcel() {
            if (allData.length === 0) return alert('Không có dữ liệu để xuất!');
            const ws = XLSX.utils.json_to_sheet(allData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Inventory");
            XLSX.writeFile(wb, "TonKho_Warehouse_Data.xlsx");
        }

        function openModal(id) {
            document.getElementById(id).classList.remove('opacity-0', 'pointer-events-none');
        }
        function closeModal(id) {
            document.getElementById(id).classList.add('opacity-0', 'pointer-events-none');
        }
        function switchImportTab(tab) {
            const manualForm = document.getElementById('manualForm');
            const csvForm = document.getElementById('csvForm');
            const tabManual = document.getElementById('tabManual');
            const tabCsv = document.getElementById('tabCsv');

            if (tab === 'manual') {
                manualForm.classList.remove('hidden');
                csvForm.classList.add('hidden');
                tabManual.className = 'py-2 px-4 border-b-2 border-blue-500 font-bold text-blue-600 transition';
                tabCsv.className = 'py-2 px-4 border-b-2 border-transparent text-gray-500 hover:text-blue-500 transition';
            } else {
                manualForm.classList.add('hidden');
                csvForm.classList.remove('hidden');
                tabCsv.className = 'py-2 px-4 border-b-2 border-blue-500 font-bold text-blue-600 transition';
                tabManual.className = 'py-2 px-4 border-b-2 border-transparent text-gray-500 hover:text-blue-500 transition';
            }
        }

        loadData();
    </script>
</body>
</html>
