<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Dashboard - Quản Lý Tồn Kho</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Thêm thư viện Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .modal { transition: opacity 0.25s ease; }
        body { background-color: #f8fafc; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <h1 class="text-3xl font-extrabold text-slate-800 flex items-center gap-3">
                <span class="text-4xl">📦</span> Warehouse <span class="text-blue-600">Analytics</span>
            </h1>
            <div class="flex flex-wrap gap-3">
                <button onclick="openModal('importModal')" class="bg-blue-600 text-white px-5 py-2.5 rounded-lg shadow-md hover:bg-blue-700 transition flex items-center gap-2 font-semibold">
                    <span>➕</span> Nhập Kho
                </button>
                <button onclick="openModal('exportModal')" class="bg-red-500 text-white px-5 py-2.5 rounded-lg shadow-md hover:bg-red-600 transition flex items-center gap-2 font-semibold">
                    <span>📤</span> Xuất Kho
                </button>
                <button onclick="exportToExcel()" class="bg-emerald-600 text-white px-5 py-2.5 rounded-lg shadow-md hover:bg-emerald-700 transition flex items-center gap-2 font-semibold">
                    <span>📊</span> Xuất Excel
                </button>
            </div>
        </div>

        <!-- DASHBOARD SECTION -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <!-- Chart 1: Tỉ lệ theo Kho -->
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col items-center">
                <h3 class="text-sm font-bold text-slate-500 uppercase mb-4 text-center">Phân bổ theo Kho (WH)</h3>
                <div class="w-full max-w-[250px]">
                    <canvas id="chartWh"></canvas>
                </div>
            </div>
            <!-- Chart 2: Số lượng theo Bin -->
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="text-sm font-bold text-slate-500 uppercase mb-4 text-center">Số lượng theo Bin</h3>
                <canvas id="chartBin"></canvas>
            </div>
            <!-- Chart 3: Top Quality -->
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="text-sm font-bold text-slate-500 uppercase mb-4 text-center">Top 5 Quality cao nhất</h3>
                <canvas id="chartQuality"></canvas>
            </div>
        </div>

        <!-- Filter Section -->
        <div class="bg-white p-5 rounded-2xl shadow-sm mb-6 grid grid-cols-1 md:grid-cols-5 gap-4 border border-slate-200">
            <div class="flex flex-col gap-1">
                <label class="text-xs font-bold text-slate-400 uppercase">Lọc Bin</label>
                <input type="text" id="filterBin" placeholder="Nhập Bin..." class="border border-slate-200 p-2 rounded-lg w-full focus:ring-2 focus:ring-blue-400 outline-none transition" oninput="filterTable()">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-xs font-bold text-slate-400 uppercase">Lọc TagID</label>
                <input type="text" id="filterTag" placeholder="Nhập TagID..." class="border border-slate-200 p-2 rounded-lg w-full focus:ring-2 focus:ring-blue-400 outline-none transition" oninput="filterTable()">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-xs font-bold text-slate-400 uppercase">Lọc Code</label>
                <input type="text" id="filterCode" placeholder="Nhập Code..." class="border border-slate-200 p-2 rounded-lg w-full focus:ring-2 focus:ring-blue-400 outline-none transition" oninput="filterTable()">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-xs font-bold text-slate-400 uppercase">Lọc WH (Kho)</label>
                <input type="text" id="filterWh" placeholder="Nhập WH..." class="border border-slate-200 p-2 rounded-lg w-full focus:ring-2 focus:ring-blue-400 outline-none transition" oninput="filterTable()">
            </div>
            <div class="flex items-end">
                <button onclick="resetFilter()" class="w-full bg-slate-100 text-slate-600 px-4 py-2 rounded-lg hover:bg-slate-200 transition font-bold text-sm">
                    🔄 Xóa bộ lọc
                </button>
            </div>
        </div>

        <!-- Inventory Table -->
        <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-slate-200">
            <div class="overflow-x-auto">
                <table class="min-w-full leading-normal">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 uppercase text-xs font-bold leading-normal">
                            <th class="py-4 px-6 text-left">Thời gian</th>
                            <th class="py-4 px-6 text-left">TagID</th>
                            <th class="py-4 px-6 text-left">Bin</th>
                            <th class="py-4 px-6 text-left">Code</th>
                            <th class="py-4 px-6 text-left">WH</th>
                            <th class="py-4 px-6 text-left">Quality</th>
                            <th class="py-4 px-6 text-center">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryBody" class="text-slate-600 text-sm font-light">
                        <!-- Data load here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODALS (Giữ nguyên logic như bản trước) -->
    <div id="importModal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50">
        <div class="modal-overlay absolute w-full h-full bg-slate-900 opacity-50"></div>
        <div class="modal-container bg-white w-11/12 md:max-w-md mx-auto rounded-2xl shadow-2xl z-50 overflow-y-auto">
            <div class="py-4 text-left px-6">
                <div class="flex justify-between items-center pb-4 border-b">
                    <p class="text-xl font-bold text-slate-800">📥 Nhập Kho</p>
                    <div class="cursor-pointer text-slate-400 hover:text-slate-600 text-2xl" onclick="closeModal('importModal')">×</div>
                </div>
                <div class="flex mb-6 mt-4 border-b">
                    <button onclick="switchImportTab('manual')" id="tabManual" class="py-2 px-4 border-b-2 border-blue-500 font-bold text-blue-600 transition">Thủ công</button>
                    <button onclick="switchImportTab('csv')" id="tabCsv" class="py-2 px-4 border-b-2 border-transparent text-slate-500 hover:text-blue-500 transition">File CSV</button>
                </div>
                <div id="manualForm" class="space-y-4">
                    <input type="text" id="inTag" placeholder="Tag ID" class="w-full border p-2 rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
                    <input type="text" id="inBin" placeholder="Bin" class="w-full border p-2 rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
                    <input type="text" id="inCode" placeholder="Code" class="w-full border p-2 rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
                    <input type="text" id="inWh" placeholder="WH (Kho)" class="w-full border p-2 rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
                    <input type="text" id="inQuality" placeholder="Quality" class="w-full border p-2 rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
                    <button onclick="insertManual()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 shadow transition">Lưu dữ liệu</button>
                </div>
                <div id="csvForm" class="hidden space-y-4">
                    <div class="bg-amber-50 p-3 rounded-lg border border-amber-200 text-xs text-amber-700">Định dạng: tagID, bin, code, wh, quality</div>
                    <input type="file" id="csvFile" accept=".csv" class="w-full border p-2 rounded-lg bg-slate-50">
                    <button onclick="insertCSV()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 shadow transition">Upload CSV</button>
                </div>
            </div>
        </div>
    </div>

    <div id="exportModal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50">
        <div class="modal-overlay absolute w-full h-full bg-slate-900 opacity-50"></div>
        <div class="modal-container bg-white w-11/12 md:max-w-md mx-auto rounded-2xl shadow-2xl z-50 overflow-y-auto">
            <div class="py-4 text-left px-6">
                <div class="flex justify-between items-center pb-4 border-b">
                    <p class="text-xl font-bold text-slate-800">📤 Xuất Kho</p>
                    <div class="cursor-pointer text-slate-400 hover:text-slate-600 text-2xl" onclick="closeModal('exportModal')">×</div>
                </div>
                <div class="space-y-4 mt-6">
                    <input type="text" id="outTag" placeholder="Nhập TagID để xuất..." class="w-full border p-2 rounded-lg outline-none focus:ring-2 focus:ring-red-400">
                    <button onclick="removeInventory()" class="w-full bg-red-500 text-white py-3 rounded-lg font-bold hover:bg-red-600 shadow transition">Xác nhận Xuất</button>
                </div>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50">
        <div class="modal-overlay absolute w-full h-full bg-slate-900 opacity-50"></div>
        <div class="modal-container bg-white w-11/12 md:max-w-md mx-auto rounded-2xl shadow-2xl z-50 overflow-y-auto">
            <div class="py-4 text-left px-6">
                <div class="flex justify-between items-center pb-4 border-b">
                    <p class="text-xl font-bold text-slate-800">✏️ Chỉnh sửa</p>
                    <div class="cursor-pointer text-slate-400 hover:text-slate-600 text-2xl" onclick="closeModal('editModal')">×</div>
                </div>
                <input type="hidden" id="editId">
                <div class="space-y-4 mt-6">
                    <input type="text" id="editTag" class="w-full border p-2 rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
                    <input type="text" id="editBin" class="w-full border p-2 rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
                    <input type="text" id="editCode" class="w-full border p-2 rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
                    <input type="text" id="editWh" class="w-full border p-2 rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
                    <input type="text" id="editQuality" class="w-full border p-2 rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
                    <button onclick="updateInventory()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 shadow transition">Cập nhật</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ayxhdqaendspvdxibayh.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5eGhkcWFlbmRzcHZkeGliYXloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NDAzMDQsImV4cCI6MjA5NTUxNjMwNH0.MOmERW-oVJitj6fAB85439_nxqeyYMQhQ5rYr8TF-Fc';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allData = [];
        let charts = {}; // Lưu trữ đối tượng chart để update

        async function loadData() {
            const { data, error } = await supabaseClient.from('inventory').select('*').order('created_at', { ascending: false });
            if (error) alert('Lỗi: ' + error.message);
            else {
                allData = data;
                renderTable(data);
                initCharts(data); // Vẽ biểu đồ khi load data
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('inventoryBody');
            tbody.innerHTML = '';
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="py-10 text-center text-slate-400 italic">Không có dữ liệu...</td></tr>';
                return;
            }
            data.forEach(item => {
                tbody.innerHTML += `
                    <tr class="border-b border-slate-100 hover:bg-slate-50 transition">
                        <td class="py-4 px-6 text-left text-slate-500">${new Date(item.created_at).toLocaleString('vi-VN')}</td>
                        <td class="py-4 px-6 text-left font-semibold text-slate-800">${item.tag_id}</td>
                        <td class="py-4 px-6 text-left">${item.bin || '-'}</td>
                        <td class="py-4 px-6 text-left">${item.code || '-'}</td>
                        <td class="py-4 px-6 text-left font-medium text-blue-600">${item.wh || '-'}</td>
                        <td class="py-4 px-6 text-left"><span class="px-2 py-1 bg-slate-100 rounded-full text-xs">${item.quality || '-'}</span></td>
                        <td class="py-4 px-6 text-center"><button onclick="openEditModal(${item.id}, '${item.tag_id}', '${item.bin}', '${item.code}', '${item.wh}', '${item.quality}')" class="text-blue-600 hover:underline font-medium">Sửa</button></td>
                    </tr>`;
            });
        }

        // --- LOGIC BIỂU ĐỒ ---
        function initCharts(data) {
            // 1. Xử lý dữ liệu cho biểu đồ WH (Kho)
            const whCounts = {};
            data.forEach(item => {
                const wh = item.wh || 'Không xác định';
                whCounts[wh] = (whCounts[wh] || 0) + 1;
            });

            // 2. Xử lý dữ liệu cho biểu đồ Bin
            const binCounts = {};
            data.forEach(item => {
                const bin = item.bin || 'Không xác định';
                binCounts[bin] = (binCounts[bin] || 0) + 1;
            });

            // 3. Xử lý Top 5 Quality
            const sortedQuality = [...data]
                .sort((a, b) => (parseFloat(b.quality) || 0) - (parseFloat(a.quality) || 0))
                .slice(0, 5);

            // Vẽ biểu đồ WH (Pie)
            if(charts.wh) charts.wh.destroy();
            charts.wh = new Chart(document.getElementById('chartWh'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(whCounts),
                    datasets: [{
                        data: Object.values(whCounts),
                        backgroundColor: ['#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6'],
                        borderWidth: 0
                    }]
                },
                options: { plugins: { legend: { position: 'bottom' } }, cutout: '70%' }
            });

            // Vẽ biểu đồ Bin (Bar)
            if(charts.bin) charts.bin.destroy();
            charts.bin = new Chart(document.getElementById('chartBin'), {
                type: 'bar',
                data: {
                    labels: Object.keys(binCounts),
                    datasets: [{
                        label: 'Số lượng',
                        data: Object.values(binCounts),
                        backgroundColor: '#3b82f6',
                        borderRadius: 5
                    }]
                },
                options: { scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
            });

            // Vẽ biểu đồ Quality (Horizontal Bar)
            if(charts.quality) charts.quality.destroy();
            charts.quality = new Chart(document.getElementById('chartQuality'), {
                type: 'bar',
                data: {
                    labels: sortedQuality.map(i => i.code),
                    datasets: [{
                        label: 'Giá trị Quality',
                        data: sortedQuality.map(i => parseFloat(i.quality) || 0),
                        backgroundColor: '#10b981',
                        borderRadius: 5
                    }]
                },
                options: { indexAxis: 'y', scales: { x: { beginAtZero: true } } }
            });
        }

        function filterTable() {
            const bin = document.getElementById('filterBin').value.toLowerCase();
            const tag = document.getElementById('filterTag').value.toLowerCase();
            const code = document.getElementById('filterCode').value.toLowerCase();
            const wh = document.getElementById('filterWh').value.toLowerCase();

            const filtered = allData.filter(item => 
                (item.bin || '').toLowerCase().includes(bin) &&
                (item.tag_id || '').toLowerCase().includes(tag) &&
                (item.code || '').toLowerCase().includes(code) &&
                (item.wh || '').toLowerCase().includes(wh)
            );
            renderTable(filtered);
            initCharts(filtered); // Cập nhật biểu đồ theo filter
        }

        function resetFilter() {
            document.getElementById('filterBin').value = '';
            document.getElementById('filterTag').value = '';
            document.getElementById('filterCode').value = '';
            document.getElementById('filterWh').value = '';
            renderTable(allData);
            initCharts(allData);
        }

        async function insertManual() {
            const payload = {
                tag_id: document.getElementById('inTag').value,
                bin: document.getElementById('inBin').value,
                code: document.getElementById('inCode').value,
                wh: document.getElementById('inWh').value,
                quality: document.getElementById('inQuality').value,
            };
            if(!payload.tag_id) return alert('Vui lòng nhập TagID');
            const { error } = await supabaseClient.from('inventory').insert([payload]);
            if (error) alert('Lỗi: ' + error.message);
            else { alert('✅ Thành công!'); closeModal('importModal'); loadData(); }
        }

        async function insertCSV() {
            const file = document.getElementById('csvFile').files[0];
            if (!file) return alert('Chọn file CSV');
            const reader = new FileReader();
            reader.onload = async (e) => {
                const rows = e.target.result.split('\n').slice(1);
                const dataToInsert = rows.filter(row => row.trim()).map(row => {
                    const cols = row.split(',');
                    return { tag_id: cols[0]?.trim(), bin: cols[1]?.trim(), code: cols[2]?.trim(), wh: cols[3]?.trim(), quality: cols[4]?.trim() };
                });
                const { error } = await supabaseClient.from('inventory').insert(dataToInsert);
                if (error) alert('Lỗi: ' + error.message);
                else { alert('✅ Thành công!'); closeModal('importModal'); loadData(); }
            };
            reader.readAsText(file);
        }

        async function removeInventory() {
            const tagId = document.getElementById('outTag').value;
            if (!tagId) return alert('Nhập TagID');
            if(!confirm('Xác nhận xuất kho?')) return;
            const { error } = await supabaseClient.from('inventory').delete().eq('tag_id', tagId);
            if (error) alert('Lỗi: ' + error.message);
            else { alert('✅ Thành công!'); closeModal('exportModal'); loadData(); }
        }

        function openEditModal(id, tag, bin, code, wh, quality) {
            document.getElementById('editId').value = id;
            document.getElementById('editTag').value = tag;
            document.getElementById('editBin').value = bin;
            document.getElementById('editCode').value = code;
            document.getElementById('editWh').value = wh;
            document.getElementById('editQuality').value = quality;
            openModal('editModal');
        }

        async function updateInventory() {
            const id = document.getElementById('editId').value;
            const payload = {
                tag_id: document.getElementById('editTag').value,
                bin: document.getElementById('editBin').value,
                code: document.getElementById('editCode').value,
                wh: document.getElementById('editWh').value,
                quality: document.getElementById('editQuality').value,
            };
            const { error } = await supabaseClient.from('inventory').update(payload).eq('id', id);
            if (error) alert('Lỗi: ' + error.message);
            else { alert('✅ Thành công!'); closeModal('editModal'); loadData(); }
        }

        function exportToExcel() {
            if (allData.length === 0) return alert('Không có dữ liệu!');
            const ws = XLSX.utils.json_to_sheet(allData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Inventory");
            XLSX.writeFile(wb, "Warehouse_Report.xlsx");
        }

        function openModal(id) { document.getElementById(id).classList.remove('opacity-0', 'pointer-events-none'); }
        function closeModal(id) { document.getElementById(id).classList.add('opacity-0', 'pointer-events-none'); }
        function switchImportTab(tab) {
            document.getElementById('manualForm').classList.toggle('hidden', tab !== 'manual');
            document.getElementById('csvForm').classList.toggle('hidden', tab !== 'csv');
            document.getElementById('tabManual').className = tab === 'manual' ? 'py-2 px-4 border-b-2 border-blue-500 font-bold text-blue-600 transition' : 'py-2 px-4 border-b-2 border-transparent text-slate-500 hover:text-blue-500 transition';
            document.getElementById('tabCsv').className = tab === 'csv' ? 'py-2 px-4 border-b-2 border-blue-500 font-bold text-blue-600 transition' : 'py-2 px-4 border-b-2 border-transparent text-slate-500 hover:text-blue-500 transition';
        }

        loadData();
    </script>
</body>
</html>
